<div>
    <h2>{{ task?.name }}</h2>
    <p>Status: {{ task?.completed ? 'Concluída' : 'Pendente' }}  </p>
    <div>
        <h2>Descrição</h2>
        <textarea [(ngModel)]="task!.description"></textarea>
        <button class="btn btn-primary" (click)="save()">Salvar</button>
        <button class="btn btn-secondary" (click)="cancel()">Cancelar</button>   
    </div>
</div>
