<app-task-filter (taskfilter)="filterTasks($event)"></app-task-filter>
<div class="container">
    <h2 class="fazer">A Fazer</h2>
    <br>
    <ul>
        @for (task of tasks; track $index){        <li > 
            <input type="checkbox" (change)="updateTasks()" [(ngModel)]="task.completed" name ="completed">
            <a [routerLink]="['/task-detail', task.id]"
            [ngClass]="task.completed ? 'completed' : ''">{{ task.name }}</a>
            <div class="button-box">
                <button (click)="removeTask(task)">X</button>
                
            </div>
        </li>
         }
    </ul>

    <form (ngSubmit)="addTask()" #taskForm="ngForm">
    <input type="text" name="newTask" placeholder="Adicionar nova tarefa" [(ngModel)]="newTask.name" required>
    <button type="submit" [disabled]="!taskForm.form.valid">+</button>
    </form>
</div>
